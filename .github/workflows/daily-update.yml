name: Daily ETF Update

on:
  schedule:
    # UTC 13:00 = 台灣時間 21:00
    - cron: '0 13 * * *'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write  # 讓 Action 可以推送到 repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install common dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml openpyxl

      - name: Run tracker script
        run: python tracker_00981A.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Daily update $(date +'%Y-%m-%d %H:%M' -d '+8 hours')"
          git push
