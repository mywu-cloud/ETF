name: Daily ETF Update

on:
  schedule:
    # UTC 12:00 = 台灣時間 20:00
    - cron: '0 12 * * *'
    # UTC 12:30 = 台灣時間 20:30（備援）
    - cron: '30 12 * * *'
    # UTC 13:00 = 台灣時間 21:00（備援）
    - cron: '00 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      - name: Run tracker script
        run: python tracker_00981A.py && python tracker_00403A.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Daily update $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          git push
