<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 持股追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: "PingFang TC", "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
background: #f0f2f5; color: #1a1a2e; font-size: 14px; line-height: 1.55; }
header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
color: white; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 20px; font-weight: 700; }
header span { opacity: .6; font-size: 14px; }
.container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.tab { padding: 10px 22px; border-radius: 8px 8px 0 0; border: none; cursor: pointer;
font-size: 14px; font-weight: 600; background: #dde1ea; color: #555; transition: .2s; }
.tab.active { background: white; color: #1a1a2e; box-shadow: 0 -2px 8px rgba(0,0,0,.08); }
.card { background: white; border-radius: 12px; padding: 24px;
box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 20px; }
.card h2 { font-size: 15px; margin-bottom: 16px; color: #16213e; }
.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
select, input { padding: 8px 12px; border: 1px solid #d0d5dd; border-radius: 8px;
font-size: 14px; outline: none; }
select:focus, input:focus { border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,.15); }
label { font-size: 14px; font-weight: 600; color: #555; }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { background: #f7f8fc; padding: 11px 14px; text-align: left; font-weight: 700;
border-bottom: 2px solid #e2e8f0; cursor: pointer; user-select: none; white-space: nowrap;
font-size: 14px; letter-spacing: .02em; }
thead th:hover { background: #eef0f8; }
thead th { position: relative; }
thead th[data-key] { padding-right: 22px; }
thead th[data-key]::after { content: " ⇅"; opacity: .25; font-size: 11px; margin-left: 4px; font-weight: normal; }
thead th.sort-asc::after { content: " ▲"; opacity: 1; color: #4361ee; }
thead th.sort-desc::after { content: " ▼"; opacity: 1; color: #4361ee; }
thead th.bar-cell::after, thead th:empty::after { content: none; }
tbody tr { border-bottom: 1px solid #f0f2f5; transition: background .15s; }
tbody tr:hover { background: #f7f9ff; }
td { padding: 10px 14px; font-size: 14px; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.bar-cell { width: 120px; }
.bar-bg { background: #e9ecef; border-radius: 4px; height: 8px; }
.bar-fill { background: linear-gradient(90deg, #4361ee, #7b97ff); border-radius: 4px; height: 8px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 14px; font-weight: 600; }
.badge-new { background: #fee2e2; color: #991b1b; }
.badge-del { background: #d1fae5; color: #065f46; }
.badge-up { background: #fee2e2; color: #991b1b; }
.badge-dn { background: #d1fae5; color: #065f46; }
.diff-up { color: #dc2626; font-weight: 700; }
.diff-dn { color: #16a34a; font-weight: 700; }
.diff-new { background: #fff1f2; }
.diff-del { background: #f0fdf4; }
.price-up { color: #dc2626; font-weight: 700; }
.price-dn { color: #16a34a; font-weight: 700; }
.price-flat { color: #888; }
.chart-top { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 700px) { .chart-top { grid-template-columns: 1fr; } }
#chart-pie { max-height: 300px; }
#chart-bar-wrap { position: relative; height: 560px; width: 100%; }
#chart-bar { position: absolute; inset: 0; }
.chips { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.chip {
background: white;
border-radius: 10px;
padding: 8px 14px;
box-shadow: rgba(0, 0, 0, 0.06) 0px 2px 8px;
flex: 1 1 0%;
min-width: 120px;
}
.chip .val {
font-size: 18px;
font-weight: 800;
color: rgb(67, 97, 238);
}
.chip .lbl {
font-size: 14px;
color: rgb(136, 136, 136);
margin-top: 0;
}
.panel { display: none; }
.panel.active { display: block; }
.empty { text-align: center; padding: 40px; color: #aaa; }
.loading { text-align: center; padding: 60px; color: #888; font-size: 16px; }
.price-loading { color: #aaa; font-size: 14px; }
/* 手機版 RWD （最小字型 14px） */
@media (max-width: 600px) {
html { font-size: 14px; }
body { font-size: 14px; }
header { padding: 12px 14px; gap: 8px; }
header h1 { font-size: 16px; line-height: 1.3; }
header span { font-size: 14px; }
.container { margin: 10px auto; padding: 0 10px; }
.tabs { gap: 2px; margin-bottom: 10px; }
.tab { padding: 7px 10px; font-size: 14px; flex: 1; min-width: 0; }
.card { padding: 12px; border-radius: 10px; margin-bottom: 10px; }
.card h2 { font-size: 14px; margin-bottom: 8px; }
.controls { gap: 8px; margin-bottom: 10px; }
.controls input,
.controls select { font-size: 14px; padding: 6px 9px; }
label { font-size: 14px; }
#search { width: 100% !important; }
.chips { gap: 6px; margin-bottom: 10px; }
.chip { padding: 8px 10px; min-width: 0; flex: 1 1 45%; }
.chip .val { font-size: 15px; }
.chip .lbl { font-size: 14px; }
table { font-size: 14px; }
thead th { padding: 6px 6px; font-size: 14px; }
thead th[data-key] { padding-right: 16px; }
thead th::after { font-size: 10px !important; margin-left: 2px; }
td { padding: 6px 6px; font-size: 14px; }
td.bar-cell { width: 50px; }
.badge { font-size: 14px; padding: 1px 5px; }
.bar-bg, .bar-fill { height: 6px; }
.loading { font-size: 14px; padding: 40px; }
.empty { padding: 24px; font-size: 14px; }
#chart-bar-wrap { height: 520px; }
#chart-pie { max-height: 220px; }
.chart-top { gap: 12px; }
}
.quick-ranges {
display: flex;
gap: 6px;
flex-wrap: wrap;
align-items: center;
margin-bottom: 14px;
}
.quick-ranges .qr-label {
font-size: 14px;
color: rgb(136, 136, 136);
margin-right: 4px;
}
.qr-btn { padding: 6px 12px; border-radius: 99px; border: 1px solid #d0d5dd;
background: white; color: #555; font-size: 14px; cursor: pointer;
font-weight: 600; transition: all .15s; }
.qr-btn:hover { border-color: #4361ee; color: #4361ee; }
.qr-btn.active { background: #4361ee; border-color: #4361ee; color: white; }
.diff-info {
background: rgb(247, 248, 252);
border-radius: 8px;
padding: 6px 12px;
margin-bottom: 0;
margin-left: auto;
font-size: 14px;
color: rgb(85, 85, 85);
display: flex;
align-items: center;
gap: 8px;
flex-wrap: wrap;
}
.diff-info b { color: rgb(26, 26, 46); }
.diff-info .swap-tip {
color: rgb(180, 83, 9);
background: rgb(254, 243, 199);
padding: 2px 8px;
border-radius: 99px;
font-size: 14px;
}
@media (max-width: 600px) {
.quick-ranges { gap: 4px; margin-bottom: 10px; }
.qr-btn { padding: 5px 10px; font-size: 14px; }
.diff-info { font-size: 14px; padding: 8px 10px; }
}
</style>
</head>
<body>
<header>
<div>
<h1 id="etf-title">ETF</h1>
<span id="etf-subtitle">持股追蹤儀表板</span></div><div id="etf-switcher" style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center"></div>
</div>
</header>
<div class="container">
<div id="loading" class="loading">⏳ 載入資料中…</div>

<div id="main" style="display:none">
<div class="tabs">
<button class="tab active" onclick="showPanel('panel-holdings', this)">📋 持股清單</button>
<button class="tab" onclick="showPanel('panel-chart', this)">📊 圖表分析</button>
<button class="tab" onclick="showPanel('panel-diff', this)">🔄 差異比較</button>
</div>

<!-- Panel 1: Holdings -->
<div id="panel-holdings" class="panel active">
<div class="controls">
<div><label>資料日期</label><br>
<select id="snap-sel" onchange="renderHoldings()"></select>
</div>
<div style="margin-top:auto"><input type="text" id="search" placeholder="🔍 搜尋名稱 / 代碼…" oninput="renderHoldings()" style="width:220px"></div>
</div>
<p style="font-size:14px;color:#666;margin:6px 0 0 2px;">點選欄位表頭可進行排序</p>
<div id="chips" class="chips"></div>
<div id="price-status" style="font-size:14px;color:#888;margin:0 0 8px 2px;"></div>
<div class="card" style="padding:0;overflow:hidden">
<div class="tbl-wrap">
<table id="tbl">
<thead><tr>
<th data-key="rank" onclick="sortBy('rank')">#</th>
<th data-key="name" onclick="sortBy('name')">股票名稱</th>
<th data-key="ticker" onclick="sortBy('ticker')">代碼</th>
<th data-key="weight" onclick="sortBy('weight')">投資比例</th>
<th class="bar-cell"></th>
<th data-key="price" onclick="sortBy('price')">股價</th>
<th data-key="change" onclick="sortBy('change')">漲跨</th>
<th data-key="changeP" onclick="sortBy('changeP')">漲跨幅</th>
<th data-key="shares" onclick="sortBy('shares')">持有股數</th>
<th data-key="prev_shares" onclick="sortBy('prev_shares')">前期股數</th>
<th data-key="delta_shares" onclick="sortBy('delta_shares')">股數差異</th>
</tr></thead>
<tbody id="tbl-body"></tbody>
</table>
</div>
</div>
</div>

<!-- Panel 2: Charts -->
<div id="panel-chart" class="panel">
<div class="controls">
<div><label>資料日期</label><br>
<select id="chart-snap-sel" onchange="renderCharts()"></select>
</div>
</div>
<div class="chart-top">
<div class="card"><h2>前 10 大持股比例</h2><canvas id="chart-pie"></canvas></div>
<div class="card" style="display:flex;flex-direction:column;justify-content:center;">
<p style="font-size:14px;color:#888;text-align:center;padding:8px 0;">選擇日期後載入圖表</p>
</div>
</div>
<div class="card" style="margin-top:0;">
<h2>前 20 大持股(投資比例 %)</h2>
<div id="chart-bar-wrap"><canvas id="chart-bar"></canvas></div>
</div>
</div>

<!-- Panel 3: Diff -->
<div id="panel-diff" class="panel">
<div class="quick-ranges" id="quick-ranges">
<span class="qr-label">快速比較：</span>
<button class="qr-btn" data-range="5" onclick="applyQuickRange(5, this)">近 5 日</button>
<button class="qr-btn" data-range="10" onclick="applyQuickRange(10, this)">近 10 日</button>
<button class="qr-btn" data-range="20" onclick="applyQuickRange(20, this)">近 20 日</button>
<button class="qr-btn" data-range="prev" onclick="applyQuickRange('prev', this)">最近兩筆</button>
<button class="qr-btn" data-range="all" onclick="applyQuickRange('all', this)">全部期間</button>
<div class="diff-info" id="diff-info">📅 比較區間：<b></b> → <b></b>（X 個交易日）</div>
</div>
<div class="diff-info" id="diff-info"></div>
<div class="controls">
<div><label>舊快照</label><br>
<select id="diff-old" onchange="renderDiff()"></select>
</div>
<div><label>新快照</label><br>
<select id="diff-new" onchange="renderDiff()"></select>
</div>
</div>
<p style="font-size:14px;color:#666;margin:6px 0 0 2px;">點選欄位表頭可進行排序</p>
<div id="diff-chips" class="chips"></div>
<div id="diff-content"></div>
</div>
</div>
</div>
<script>
let DATA = {};
let DATES = [];
let sortKey = 'weight', sortDir = -1;
let PRICE_DATA = {}; // ticker -> {price, change, changeP}

const ETF_LIST = [{id:'00981A',name:'主動統一台股增長'},{id:'00403A',name:'主動統一升続50'}];
let CURRENT_ETF = (new URLSearchParams(location.search)).get('etf') || localStorage.getItem('current_etf') || '00981A';

function renderEtfSwitcher() {
const wrap = document.getElementById('etf-switcher');
if (!wrap) return;
wrap.innerHTML = '<span style="color:#fff;font-size:14px;font-weight:600;opacity:.85;margin-right:4px">ETF 列表：</span>' +
ETF_LIST.map(e => `<button onclick="switchEtf('${e.id}')" style="padding:6px 14px;border-radius:99px;border:1px solid ${e.id===CURRENT_ETF?'#fff':'rgba(255,255,255,.3)'};background:${e.id===CURRENT_ETF?'#fff':'transparent'};color:${e.id===CURRENT_ETF?'#1a1a2e':'#fff'};font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap">${e.id}${e.name?' '+e.name:''}</button>`).join('');
const meta = ETF_LIST.find(e=>e.id===CURRENT_ETF);
document.getElementById('etf-title').innerHTML = `ETF ${CURRENT_ETF} &nbsp;${meta?meta.name:''}`;
document.title = `ETF ${CURRENT_ETF} 持股追蹤`;
}

function switchEtf(id) {
if (id === CURRENT_ETF) return;
CURRENT_ETF = id;
localStorage.setItem('current_etf', id);
renderEtfSwitcher();
document.getElementById('loading').style.display = 'block';
document.getElementById('main').style.display = 'none';
document.getElementById('loading').innerHTML = '⏳ 載入資料中…';
loadData();
}

// ── 資料价格 API (TWSE STOCK_DAY_ALL) ────────────────────────
async function fetchPrices(tickers) {
if (!tickers || tickers.length === 0) return;
const statusEl = document.getElementById('price-status');
if (statusEl) statusEl.textContent = '⌛ 載入股價資料中…';
try {
// TWSE 每日収盤資料 (STOCK_DAY_ALL): 支持 CORS
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,'0');
const dd = String(today.getDate()).padStart(2,'0');
const dateStr = yyyy + mm + dd;
const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=json&date=${dateStr}`;
const resp = await fetch(url);
if (!resp.ok) throw new Error('HTTP ' + resp.status);
const json = await resp.json();
PRICE_DATA = {};
if (json.data && json.fields) {
// fields: [證券代號, 證券名稱, 成交股數, 成交金額, 開盤價, 最高價, 最低價, 收盤價, 漲跌價差, 成交筆數]
const tickerSet = new Set(tickers);
for (const row of json.data) {
const ticker = row[0].trim();
if (!tickerSet.has(ticker)) continue;
const closeStr = row[7].replace(/,/g,'');
const changeStr = row[8].replace(/,/g,'');
const close = parseFloat(closeStr);
const changeSign = changeStr.startsWith('+') ? 1 : changeStr.startsWith('-') ? -1 : 0;
const changeVal = parseFloat(changeStr.replace(/[+\-]/g,'')) * changeSign;
const prevClose = close - changeVal;
const changeP = prevClose !== 0 ? parseFloat((changeVal / prevClose * 100).toFixed(2)) : 0;
PRICE_DATA[ticker] = {
price: isNaN(close) ? null : close,
change: isNaN(changeVal) ? null : parseFloat(changeVal.toFixed(2)),
changeP: isNaN(changeP) ? null : changeP
};
}
}
if (statusEl) {
const loaded = Object.keys(PRICE_DATA).length;
const now = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
statusEl.textContent = loaded > 0 ? `股價已更新 ${now}（${loaded}/${tickers.length} 支）` : '股價資料暫無（非交易日）';
}
} catch(e) {
console.warn('fetchPrices failed:', e);
if (statusEl) statusEl.textContent = '股價資料載入失敗';
}
renderHoldings();
}
// ── 載入資料 ────────────────────────────────────────────────
async function loadData() {
renderEtfSwitcher();
try {
const resp = await fetch('data/history_' + CURRENT_ETF + '.json?t=' + Date.now());
if (!resp.ok) throw new Error('HTTP ' + resp.status);
const history = await resp.json();
DATES = history.map(s => s.data_date).sort();
DATA = {};
for (const snap of history) {
DATA[snap.data_date] = snap.holdings;
}
populateSelectors();
document.getElementById('loading').style.display = 'none';
document.getElementById('main').style.display = 'block';
renderHoldings();
renderDiff();
if (document.getElementById('panel-chart')?.classList.contains('active')) renderCharts();
// 載入最新日期的股價
const latestDate = DATES[DATES.length - 1];
if (latestDate && DATA[latestDate]) {
const tickers = DATA[latestDate].map(h => h.ticker).filter(Boolean);
fetchPrices(tickers);
}
} catch (err) {
document.getElementById('loading').innerHTML =
'<div style="color:#dc2626"><h2>載入資料失敗</h2><p style="margin-top:8px">' + err.message + '</p>' +
'<p style="color:#888;margin-top:12px;font-size:14px">請確認 data/history.json 存在</p></div>';
}
}

function populateSelectors() {
const datesDesc = [...DATES].reverse();
const datesAsc = [...DATES];
const optDesc = datesDesc.map((d, i) => `<option value="${d}">${d}${i === 0 ? '（最新）' : `（${i} 日前）`}</option>`).join('');
const optAsc = datesAsc.map((d, i) => {
const fromLatest = datesAsc.length - 1 - i;
const note = fromLatest === 0 ? '（最新）' : `（${fromLatest} 日前）`;
return `<option value="${d}">${d}${note}</option>`;
}).join('');
document.getElementById('snap-sel').innerHTML = optDesc;
document.getElementById('chart-snap-sel').innerHTML = optDesc;
document.getElementById('diff-old').innerHTML = optAsc;
const lastIdx = datesAsc.length - 1;
document.getElementById('diff-new').innerHTML = datesAsc.map(
(d, i) => {
const fromLatest = datesAsc.length - 1 - i;
const note = fromLatest === 0 ? '（最新）' : `（${fromLatest} 日前）`;
return `<option value="${d}"${i === lastIdx ? ' selected' : ''}>${d}${note}</option>`;
}
).join('');
}

function showPanel(id, btn) {
document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
document.getElementById(id).classList.add('active');
btn.classList.add('active');
if (id === 'panel-chart') renderCharts();
if (id === 'panel-diff') renderDiff();
}

function fmt(n) { return Number(n).toLocaleString('zh-TW'); }

// ── Holdings ───────────────────────────────────────────────────
function sortBy(key) {
if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = -1; }
updateHoldingsSortIcons();
renderHoldings();
}

function updateHoldingsSortIcons() {
const ths = document.querySelectorAll('#tbl thead th');
ths.forEach(th => th.classList.remove('sort-asc','sort-desc'));
const target = document.querySelector(`#tbl thead th[data-key="${sortKey}"]`);
if (target) target.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
}

function renderHoldings() {
const date = document.getElementById('snap-sel').value;
if (!date || !DATA[date]) return;
updateHoldingsSortIcons();
const q = document.getElementById('search').value.trim().toLowerCase();
const prevDate = DATES[DATES.indexOf(date) - 1] ?? null;
const prevMap = prevDate ? Object.fromEntries(DATA[prevDate].map(h => [h.name, h])) : {};
let rows = DATA[date].map((h, i) => {
const prev = prevMap[h.name] ?? null;
const prev_shares = prev ? prev.shares : null;
const delta_shares = prev !== null ? h.shares - prev.shares : null;
const pd = PRICE_DATA[h.ticker] || {};
return { ...h, rank: i+1, prev_shares, delta_shares,
price: pd.price ?? null, change: pd.change ?? null, changeP: pd.changeP ?? null };
});
if (q) rows = rows.filter(h => h.name.includes(q) || (h.ticker || '').toLowerCase().includes(q));
const keyMap = { rank: 'rank', name: 'name', ticker: 'ticker', weight: 'weight',
price: 'price', change: 'change', changeP: 'changeP',
shares: 'shares', prev_shares: 'prev_shares', delta_shares: 'delta_shares' };
rows.sort((a, b) => {
const va = a[keyMap[sortKey]] ?? -Infinity;
const vb = b[keyMap[sortKey]] ?? -Infinity;
if (typeof va === 'string') return va.localeCompare(vb, 'zh-TW') * sortDir;
return (va - vb) * sortDir;
});
const maxW = Math.max(...rows.map(r => r.weight));
document.getElementById('tbl-body').innerHTML = rows.map(r => {
const deltaColor = r.delta_shares > 0 ? '#dc2626' : r.delta_shares < 0 ? '#16a34a' : '#aaa';
const deltaSign = r.delta_shares > 0 ? '+' : '';
const deltaStr = r.delta_shares !== null ? `<b style="color:${deltaColor}">${deltaSign}${fmt(r.delta_shares)}</b>` : '─';
const priceStr = r.price !== null ? `<b>${r.price.toFixed(2)}</b>` : '<span class="price-loading">─</span>';
let changeStr = '<span class="price-loading">─</span>';
let changePStr = '<span class="price-loading">─</span>';
if (r.change !== null) {
const cls = r.change > 0 ? 'price-up' : r.change < 0 ? 'price-dn' : 'price-flat';
const sign = r.change > 0 ? '+' : '';
changeStr = `<span class="${cls}">${sign}${r.change.toFixed(2)}</span>`;
changePStr = `<span class="${cls}">${sign}${r.changeP.toFixed(2)}%</span>`;
}
return `<tr>
<td class="num" style="color:#aaa">${r.rank}</td>
<td><b>${r.name}</b></td>
<td style="color:#4361ee;font-weight:600">${r.ticker || '─'}</td>
<td class="num"><b>${r.weight.toFixed(2)}%</b></td>
<td class="bar-cell">
<div class="bar-bg"><div class="bar-fill" style="width:${(r.weight/maxW*100).toFixed(1)}%"></div></div>
</td>
<td class="num">${priceStr}</td>
<td class="num">${changeStr}</td>
<td class="num">${changePStr}</td>
<td class="num">${fmt(r.shares)}</td>
<td class="num" style="color:#888">${r.prev_shares !== null ? fmt(r.prev_shares) : '─'}</td>
<td class="num">${deltaStr}</td>
</tr>`;
}).join('');
const total = DATA[date].reduce((s, h) => s + h.weight, 0);
const top10 = DATA[date].slice(0,10).reduce((s, h) => s + h.weight, 0);
document.getElementById('chips').innerHTML = `
<div class="chip"><div class="val">${DATA[date].length}</div><div class="lbl">持股支數</div></div>
<div class="chip"><div class="val">${total.toFixed(2)}%</div><div class="lbl">總投資比例</div></div>
<div class="chip"><div class="val">${top10.toFixed(2)}%</div><div class="lbl">前 10 大集中度</div></div>
<div class="chip"><div class="val">${DATA[date][0].name}</div><div class="lbl">最大持股</div></div>`;
}
// ── Charts ────────────────────────────────────────────────────
let pieChart, barChart;
const COLORS = ['#4361ee','#7b97ff','#f72585','#3a0ca3','#7209b7','#560bad',
'#480ca8','#3f37c9','#4895ef','#4cc9f0'];

function renderCharts() {
const date = document.getElementById('chart-snap-sel').value;
if (!date || !DATA[date]) return;
const rows = DATA[date];
const top10 = rows.slice(0,10);
const top20 = rows.slice(0,20);
if (pieChart) pieChart.destroy();
if (barChart) barChart.destroy();
pieChart = new Chart(document.getElementById('chart-pie'), {
type: 'doughnut',
data: {
labels: top10.map(r => r.name),
datasets: [{ data: top10.map(r => r.weight), backgroundColor: COLORS }]
},
options: { plugins: { legend: { position: window.innerWidth <= 600 ? 'bottom' : 'right', labels: { font: { size: window.innerWidth <= 600 ? 11 : 11 }, boxWidth: window.innerWidth <= 600 ? 10 : 40 } } }, cutout: '55%' }
});
barChart = new Chart(document.getElementById('chart-bar'), {
type: 'bar',
data: {
labels: top20.map(r => r.name),
datasets: [{
label: '投資比例 (%)',
data: top20.map(r => r.weight),
backgroundColor: top20.map((_, i) => i < 3 ? '#E63946' : i < 5 ? '#FF8C42' : '#7b97ff'),
borderRadius: 4,
barThickness: window.innerWidth <= 600 ? 14 : 20
}]
},
options: {
indexAxis: 'y',
maintainAspectRatio: false,
plugins: {
legend: { display: false },
tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x.toFixed(2)}%` } },
datalabels: { display: false }
},
layout: { padding: { right: window.innerWidth <= 600 ? 24 : 48 } },
scales: {
x: {
title: { display: true, text: '投資比例 (%)', font: { size: 14 } },
ticks: { font: { size: 14 } },
grid: { color: '#f0f2f5' }
},
y: {
ticks: {
font: { size: 14, weight: '600' },
color: '#1a1a2e',
callback: (val, i) => `${i+1}. ${top20[i]?.name ?? val}`
},
grid: { display: false }
}
}
}
});
}

// ── Diff ──────────────────────────────────────────────────────
let diffSortKey = 'deltaW', diffSortDir = -1;
let _changedRows = [];

function diffSortBy(key) {
if (diffSortKey === key) diffSortDir *= -1;
else { diffSortKey = key; diffSortDir = -1; }
renderChangedSection();
}

function renderChangedSection() {
const sorted = [..._changedRows].sort((a, b) => {
const va = a[diffSortKey], vb = b[diffSortKey];
if (typeof va === 'string') return va.localeCompare(vb, 'zh-TW') * diffSortDir;
return (va - vb) * diffSortDir;
});
document.querySelectorAll('#diff-changed-tbl th').forEach(th => {
th.classList.remove('sort-asc','sort-desc');
if (th.dataset.key === diffSortKey)
th.classList.add(diffSortDir === 1 ? 'sort-asc' : 'sort-desc');
});
document.getElementById('diff-changed-body').innerHTML = sorted.map(r => {
const wc = r.deltaW > 0 ? 'diff-up' : r.deltaW < 0 ? 'diff-dn' : '';
const wSign = r.deltaW > 0 ? '+' : '';
const sc = r.deltaS > 0 ? '#dc2626' : r.deltaS < 0 ? '#16a34a' : '#aaa';
const sSign = r.deltaS > 0 ? '+' : '';
return `<tr>
<td><b>${r.name}</b></td>
<td style="color:#4361ee">${r.ticker||'─'}</td>
<td class="num">${r.ow.toFixed(2)}%</td>
<td class="num">${r.nw.toFixed(2)}%</td>
<td class="num ${wc}">${r.deltaW !== 0 ? wSign+r.deltaW.toFixed(2)+'%' : '─'}</td>
<td class="num">${fmt(r.os)}</td>
<td class="num">${fmt(r.ns)}</td>
<td class="num"><b style="color:${sc}">${r.deltaS !== 0 ? sSign+fmt(r.deltaS) : '─'}</b></td>
</tr>`;
}).join('');
}

function applyQuickRange(n, btn) {
if (!DATES || DATES.length < 2) return;
const asc = [...DATES];
const lastIdx = asc.length - 1;
let oldIdx, newIdx = lastIdx;
if (n === 'all') { oldIdx = 0; }
else if (n === 'prev') { oldIdx = Math.max(0, lastIdx - 1); }
else { oldIdx = Math.max(0, lastIdx - Number(n)); }
document.getElementById('diff-old').value = asc[oldIdx];
document.getElementById('diff-new').value = asc[newIdx];
document.querySelectorAll('#quick-ranges .qr-btn').forEach(b => b.classList.remove('active'));
if (btn) btn.classList.add('active');
renderDiff();
}

function updateDiffInfo(oldDate, newDate, swapped) {
const info = document.getElementById('diff-info');
if (!info) return;
if (!oldDate || !newDate) { info.innerHTML = ''; return; }
const gap = Math.abs(DATES.indexOf(newDate) - DATES.indexOf(oldDate));
const swapNote = swapped ? '<span class="swap-tip">已自動互換</span>' : '';
info.innerHTML = `📅 比較區間：<b>${oldDate}</b> → <b>${newDate}</b>（${gap} 個交易日）${swapNote}`;
}

function renderDiff() {
let oldDate = document.getElementById('diff-old').value;
let newDate = document.getElementById('diff-new').value;
if (!oldDate || !newDate || !DATA[oldDate] || !DATA[newDate]) return;
let _swapped = false;
if (DATES.indexOf(oldDate) > DATES.indexOf(newDate)) {
const _tmp = oldDate; oldDate = newDate; newDate = _tmp;
document.getElementById('diff-old').value = oldDate;
document.getElementById('diff-new').value = newDate;
_swapped = true;
}
updateDiffInfo(oldDate, newDate, _swapped);
const oldMap = Object.fromEntries(DATA[oldDate].map(h => [h.name, h]));
const newMap = Object.fromEntries(DATA[newDate].map(h => [h.name, h]));
const allNames = new Set([...Object.keys(oldMap), ...Object.keys(newMap)]);
const added=[], removed=[], same=[];
_changedRows = [];
for (const name of allNames) {
const o = oldMap[name], n = newMap[name];
if (!o) { added.push(name); continue; }
if (!n) { removed.push(name); continue; }
const ow = o.weight, nw = n.weight;
const os = o.shares, ns = n.shares;
const deltaW = nw - ow, deltaS = ns - os;
if (deltaW !== 0 || deltaS !== 0)
_changedRows.push({ name, ticker: o.ticker||n.ticker||'', ow, nw, deltaW, os, ns, deltaS });
else same.push(name);
}
document.getElementById('diff-chips').innerHTML = `
<div class="chip"><div class="val" style="color:#dc2626">${added.length}</div><div class="lbl">新增持股</div></div>
<div class="chip"><div class="val" style="color:#16a34a">${removed.length}</div><div class="lbl">移除持股</div></div>
<div class="chip"><div class="val" style="color:#1e40af">${_changedRows.length}</div><div class="lbl">比例變化</div></div>
<div class="chip"><div class="val">${same.length}</div><div class="lbl">持平</div></div>`;
const staticRow = (name, cls, o, n) => {
const ow = o ? o.weight : 0, nw = n ? n.weight : 0;
const deltaW = nw - ow;
const wc = deltaW > 0 ? 'diff-up' : deltaW < 0 ? 'diff-dn' : '';
const os = o ? o.shares : 0, ns = n ? n.shares : 0;
const deltaS = ns - os;
const sc = deltaS > 0 ? '#dc2626' : deltaS < 0 ? '#16a34a' : '#aaa';
const sSign = deltaS > 0 ? '+' : '';
const dss = (o && n)
? `<b style="color:${sc}">${sSign}${fmt(deltaS)}</b>`
: (o ? `<b style="color:#16a34a">-${fmt(os)}</b>`
: `<b style="color:#dc2626">+${fmt(ns)}</b>`);
return `<tr class="${cls}">
<td><b>${name}</b></td>
<td style="color:#4361ee">${(o||n).ticker||'─'}</td>
<td class="num">${o ? ow.toFixed(2)+'%' : '─'}</td>
<td class="num">${n ? nw.toFixed(2)+'%' : '─'}</td>
<td class="num ${wc}">${deltaW !== 0 ? (deltaW>0?'+':'')+deltaW.toFixed(2)+'%' : '─'}</td>
<td class="num">${o ? fmt(os) : '─'}</td>
<td class="num">${n ? fmt(ns) : '─'}</td>
<td class="num">${dss}</td>
</tr>`;
};
const staticSection = (title, names, cls, getO, getN) => names.length === 0 ? '' : `
<div class="card"><h2>${title}</h2>
<div class="tbl-wrap"><table>
<thead><tr><th>股票名稱</th><th>代碼</th><th>舊比例</th><th>新比例</th><th>比例差異</th><th>舊股數</th><th>新股數</th><th>股數差異</th></tr></thead>
<tbody>${names.map(n => staticRow(n, cls, getO(n), getN(n))).join('')}</tbody>
</table></div>
</div>`;
const TH = (label, key) =>
`<th data-key="${key}" onclick="diffSortBy('${key}')" style="cursor:pointer">${label}</th>`;
const changedSection = _changedRows.length === 0 ? '' : `
<div class="card"><h2>🔵 比例 / 股數變化</h2>
<div class="tbl-wrap"><table id="diff-changed-tbl">
<thead><tr>
${TH('股票名稱','name')}
${TH('代碼','ticker')}
${TH('舊比例','ow')}
${TH('新比例','nw')}
${TH('比例差異','deltaW')}
${TH('舊股數','os')}
${TH('新股數','ns')}
${TH('股數差異','deltaS')}
</tr></thead>
<tbody id="diff-changed-body"></tbody>
</table></div>
</div>`;
document.getElementById('diff-content').innerHTML =
(oldDate === newDate ? '<div class="card"><p class="empty">請選擇不同日期進行比較</p></div>' : '') +
staticSection('🔴 新增持股', added, 'diff-new', n => null, n => newMap[n]) +
staticSection('🟢 移除持股', removed, 'diff-del', n => oldMap[n], n => null ) +
changedSection +
(added.length + removed.length + _changedRows.length === 0
? '<div class="card"><p class="empty">兩次快照持股完全相同</p></div>' : '');
if (_changedRows.length > 0) renderChangedSection();
}

// ── 啟動 ────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
